    <!-- Deferred scripts that run after React renders -->
    <script src="%PUBLIC_URL%/js/common.js" type="text/javascript" defer></script>
    <script src="%PUBLIC_URL%/js/fix.js" type="text/javascript" defer></script>
    <script src="%PUBLIC_URL%/js/complianz.js" type="text/javascript" defer></script>

    <script>
      // Mobile nav toggle
      document.addEventListener('DOMContentLoaded', function() {
        document.addEventListener('click', function(e) {
          if (e.target.closest('.tog-nav')) {
            e.preventDefault();
            var navs = document.querySelectorAll('.container.mobile .navigation');
            navs.forEach(function(nav) { nav.classList.toggle('open'); });
            document.body.classList.toggle('open');
          }
        });
      });

      // Cart modal
      document.addEventListener('DOMContentLoaded', function() {
        document.addEventListener('click', function(e) {
          if (e.target.closest('.close_cart')) {
            var cartModal = document.querySelector('.cart-modal');
            if (cartModal) cartModal.classList.remove('open');
          }
        });

        // Cart open after reload
        if (sessionStorage.getItem('cartOpen') === 'true') {
          document.body.classList.add('cart_open');
          var cartModal = document.querySelector('.cart-modal');
          if (cartModal) cartModal.classList.add('open');
          sessionStorage.removeItem('cartOpen');
        }

        // Add to cart click
        document.addEventListener('click', function(e) {
          if (e.target.closest('.ajax_add_to_cart')) {
            sessionStorage.setItem('cartOpen', 'true');
          }
        });
      });

      // xxx More Info button: show hidden product details
      document.addEventListener('DOMContentLoaded', function() {
        document.addEventListener('click', function(e) {
          var btn = e.target.closest('.xxx');
          if (!btn) return;
          // Get parent section to find visible/hidden divs
          var section = btn.closest('section');
          if (!section) return;
          var id = section.id.replace('section-', '');
          var visible = document.getElementById('visible_' + id);
          var hidden = document.getElementById('hidden_' + id);
          if (visible && hidden) {
            if (typeof jQuery !== 'undefined') {
              jQuery('#visible_' + id).fadeOut(1000, function() {});
              jQuery('#hidden_' + id).delay(1000).fadeIn('slow', function() {});
            } else {
              visible.style.display = 'none';
              hidden.style.display = 'block';
            }
          }
        });
      });

      // Modal open/close for mobile product modals
      document.addEventListener('DOMContentLoaded', function() {
        document.addEventListener('click', function(e) {
          var btn = e.target.closest('.add-to-cart[rel="modal:open"]');
          if (!btn) return;
          var href = btn.getAttribute('href');
          if (!href || !href.startsWith('#')) return;
          var modalId = href.substring(1);
          var modal = document.getElementById(modalId) || document.querySelector(href);
          if (modal) {
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
          }
        });

        // Close modal on overlay click
        document.addEventListener('click', function(e) {
          if (e.target.classList.contains('modal')) {
            e.target.style.display = 'none';
            document.body.style.overflow = '';
          }
        });
      });
    </script>
